<!DOCTYPE html>
<html>
<head>
    <title>SSH Terminal</title>
</head>
<body>
    <div id="SshTerminalPage" data-role="page" class="page type-interior pluginConfigurationPage">

        <div data-role="content">
            <div class="content-primary">

                <style>
                    #terminal-bar {
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        padding: 8px 12px;
                        background: #2d2d2d;
                        color: #ccc;
                        font-family: sans-serif;
                        font-size: 14px;
                        border-radius: 4px 4px 0 0;
                    }
                    #terminal-bar .status {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                    }
                    #terminal-bar .dot {
                        width: 10px;
                        height: 10px;
                        border-radius: 50%;
                        background: #f44;
                    }
                    #terminal-bar .dot.connected {
                        background: #4c4;
                    }
                    #terminal-bar button {
                        background: #444;
                        color: #ccc;
                        border: 1px solid #555;
                        padding: 4px 12px;
                        cursor: pointer;
                        border-radius: 3px;
                        font-size: 13px;
                        margin-left: 8px;
                    }
                    #terminal-bar button:hover {
                        background: #555;
                    }
                    #terminal-container {
                        height: 70vh;
                        background: #1e1e1e;
                        border-radius: 0 0 4px 4px;
                    }
                </style>

                <h2>SSH Terminal</h2>

                <div id="terminal-bar">
                    <div class="status">
                        <span class="dot" id="statusDot"></span>
                        <span id="statusText">Disconnected</span>
                    </div>
                    <div>
                        <button onclick="SshTerminal.reconnect()">Reconnect</button>
                        <button onclick="SshTerminal.disconnect()">Disconnect</button>
                    </div>
                </div>
                <div id="terminal-container"></div>

            </div>
        </div>

        <script>
            var SshTerminal = {
                term: null,
                fitAddon: null,
                sessionId: null,
                eventSource: null,
                inputBuffer: '',
                inputTimer: null,

                setStatus: function (connected, text) {
                    var dot = document.getElementById('statusDot');
                    var label = document.getElementById('statusText');
                    if (dot) dot.className = connected ? 'dot connected' : 'dot';
                    if (label) label.textContent = text || (connected ? 'Connected' : 'Disconnected');
                },

                getAccessToken: function () {
                    if (typeof ApiClient !== 'undefined' && ApiClient.accessToken) {
                        var token = ApiClient.accessToken();
                        if (token) return token;
                    }
                    try {
                        var creds = JSON.parse(localStorage.getItem('jellyfin_credentials'));
                        if (creds && creds.Servers && creds.Servers.length > 0) {
                            return creds.Servers[0].AccessToken;
                        }
                    } catch (e) {
                        console.error('Failed to read credentials', e);
                    }
                    return null;
                },

                getBaseUrl: function () {
                    var loc = window.location;
                    var idx = loc.pathname.indexOf('/web/');
                    if (idx >= 0) {
                        return loc.protocol + '//' + loc.host + loc.pathname.substring(0, idx);
                    }
                    return loc.protocol + '//' + loc.host;
                },

                apiRequest: function (method, path, body) {
                    var token = this.getAccessToken();
                    var url = this.getBaseUrl() + path;
                    var opts = {
                        method: method,
                        headers: {
                            'Authorization': 'MediaBrowser Token="' + token + '"'
                        }
                    };
                    if (body !== undefined) {
                        opts.headers['Content-Type'] = 'application/json';
                        opts.body = JSON.stringify(body);
                    }
                    return fetch(url, opts);
                },

                loadXtermCss: function () {
                    if (document.getElementById('xterm-css')) return Promise.resolve();
                    return new Promise(function (resolve) {
                        var link = document.createElement('link');
                        link.id = 'xterm-css';
                        link.rel = 'stylesheet';
                        link.href = 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css';
                        link.onload = resolve;
                        document.head.appendChild(link);
                    });
                },

                loadScript: function (src) {
                    return new Promise(function (resolve, reject) {
                        var s = document.createElement('script');
                        s.src = src;
                        s.onload = resolve;
                        s.onerror = reject;
                        document.head.appendChild(s);
                    });
                },

                loadDeps: function () {
                    if (typeof Terminal !== 'undefined') return Promise.resolve();
                    return this.loadXtermCss()
                        .then(function () {
                            return SshTerminal.loadScript('https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js');
                        })
                        .then(function () {
                            return SshTerminal.loadScript('https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js');
                        });
                },

                flushInput: function () {
                    var self = this;
                    if (!self.inputBuffer || !self.sessionId) return;

                    var data = self.inputBuffer;
                    self.inputBuffer = '';

                    var encoder = new TextEncoder();
                    var bytes = encoder.encode(data);
                    var base64 = btoa(String.fromCharCode.apply(null, bytes));

                    self.apiRequest('POST', '/SshTerminal/Input', {
                        sessionId: self.sessionId,
                        data: base64
                    }).catch(function (err) {
                        console.error('Input send failed', err);
                    });
                },

                sendInput: function (data) {
                    var self = this;
                    self.inputBuffer += data;
                    if (self.inputTimer) clearTimeout(self.inputTimer);
                    // Flush immediately for single chars (interactive), batch for pastes
                    if (self.inputBuffer.length <= 2) {
                        self.flushInput();
                    } else {
                        self.inputTimer = setTimeout(function () { self.flushInput(); }, 10);
                    }
                },

                connect: function () {
                    var self = this;

                    var token = self.getAccessToken();
                    if (!token) {
                        self.setStatus(false, 'No auth token');
                        return;
                    }

                    self.disconnect();

                    self.loadDeps().then(function () {
                        self.term = new Terminal({
                            cursorBlink: true,
                            fontSize: 14,
                            fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', monospace",
                            theme: {
                                background: '#1e1e1e',
                                foreground: '#d4d4d4',
                                cursor: '#d4d4d4'
                            },
                            allowProposedApi: true
                        });

                        self.fitAddon = new FitAddon.FitAddon();
                        self.term.loadAddon(self.fitAddon);

                        var container = document.getElementById('terminal-container');
                        while (container.firstChild) {
                            container.removeChild(container.firstChild);
                        }
                        self.term.open(container);
                        self.fitAddon.fit();

                        self.term.write('Connecting to SSH...\r\n');
                        self.setStatus(false, 'Connecting...');

                        // Create SSH session via POST
                        self.apiRequest('POST', '/SshTerminal/Connect').then(function (resp) {
                            if (!resp.ok) {
                                return resp.json().then(function (err) {
                                    throw new Error(err.error || 'Connection failed');
                                });
                            }
                            return resp.json();
                        }).then(function (result) {
                            self.sessionId = result.sessionId;
                            self.setStatus(true, 'Connected');
                            self.term.clear();

                            // Send initial size
                            var dims = self.fitAddon.proposeDimensions();
                            if (dims) {
                                self.apiRequest('POST', '/SshTerminal/Resize', {
                                    sessionId: self.sessionId,
                                    cols: dims.cols,
                                    rows: dims.rows
                                });
                            }

                            // Start SSE stream for output
                            var streamUrl = self.getBaseUrl()
                                + '/SshTerminal/Stream?sessionId='
                                + encodeURIComponent(self.sessionId)
                                + '&api_key=' + encodeURIComponent(token);

                            self.eventSource = new EventSource(streamUrl);

                            self.eventSource.onmessage = function (event) {
                                // Decode base64 output
                                var binary = atob(event.data);
                                var bytes = new Uint8Array(binary.length);
                                for (var i = 0; i < binary.length; i++) {
                                    bytes[i] = binary.charCodeAt(i);
                                }
                                self.term.write(bytes);
                            };

                            self.eventSource.addEventListener('disconnected', function () {
                                self.setStatus(false, 'SSH disconnected');
                                self.term.write('\r\n[Connection closed]\r\n');
                                self.cleanup();
                            });

                            self.eventSource.addEventListener('error', function (e) {
                                if (self.eventSource && self.eventSource.readyState === EventSource.CLOSED) {
                                    self.setStatus(false, 'Stream closed');
                                    self.term.write('\r\n[Connection closed]\r\n');
                                    self.cleanup();
                                }
                            });

                        }).catch(function (err) {
                            self.setStatus(false, 'Connection failed');
                            self.term.write('\r\n[Error: ' + err.message + ']\r\n');
                        });

                        // Send keystrokes via POST
                        self.term.onData(function (data) {
                            if (self.sessionId) {
                                self.sendInput(data);
                            }
                        });

                        // Handle resize
                        self.term.onResize(function (size) {
                            if (self.sessionId) {
                                self.apiRequest('POST', '/SshTerminal/Resize', {
                                    sessionId: self.sessionId,
                                    cols: size.cols,
                                    rows: size.rows
                                });
                            }
                        });

                        window.addEventListener('resize', function () {
                            if (self.fitAddon) {
                                self.fitAddon.fit();
                            }
                        });
                    });
                },

                cleanup: function () {
                    if (this.eventSource) {
                        this.eventSource.close();
                        this.eventSource = null;
                    }
                    this.sessionId = null;
                },

                reconnect: function () {
                    this.connect();
                },

                disconnect: function () {
                    var self = this;
                    if (self.sessionId) {
                        self.apiRequest('POST', '/SshTerminal/Disconnect', {
                            sessionId: self.sessionId
                        }).catch(function () {});
                    }
                    self.cleanup();
                    if (self.term) {
                        self.term.dispose();
                        self.term = null;
                    }
                    self.setStatus(false);
                },

                init: function () {
                    var token = this.getAccessToken();
                    if (token) {
                        this.connect();
                    } else {
                        var self = this;
                        setTimeout(function () { self.init(); }, 200);
                    }
                }
            };

            document.addEventListener('viewshow', function () {
                SshTerminal.init();
            });

            document.addEventListener('pageshow', function () {
                SshTerminal.init();
            });

            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                SshTerminal.init();
            }
        </script>
    </div>
</body>
</html>
