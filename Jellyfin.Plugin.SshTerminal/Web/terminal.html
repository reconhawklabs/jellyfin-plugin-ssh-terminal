<!DOCTYPE html>
<html>
<head>
    <title>SSH Terminal</title>
</head>
<body>
    <div id="SshTerminalPage" data-role="page" class="page type-interior pluginConfigurationPage">

        <div data-role="content">
            <div class="content-primary">

                <style>
                    #terminal-bar {
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        padding: 8px 12px;
                        background: #2d2d2d;
                        color: #ccc;
                        font-family: sans-serif;
                        font-size: 14px;
                        border-radius: 4px 4px 0 0;
                    }
                    #terminal-bar .status {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                    }
                    #terminal-bar .dot {
                        width: 10px;
                        height: 10px;
                        border-radius: 50%;
                        background: #f44;
                    }
                    #terminal-bar .dot.connected {
                        background: #4c4;
                    }
                    #terminal-bar button {
                        background: #444;
                        color: #ccc;
                        border: 1px solid #555;
                        padding: 4px 12px;
                        cursor: pointer;
                        border-radius: 3px;
                        font-size: 13px;
                        margin-left: 8px;
                    }
                    #terminal-bar button:hover {
                        background: #555;
                    }
                    #terminal-container {
                        height: 70vh;
                        background: #1e1e1e;
                        border-radius: 0 0 4px 4px;
                    }
                </style>

                <h2>SSH Terminal</h2>

                <div id="terminal-bar">
                    <div class="status">
                        <span class="dot" id="statusDot"></span>
                        <span id="statusText">Disconnected</span>
                    </div>
                    <div>
                        <button onclick="SshTerminal.reconnect()">Reconnect</button>
                        <button onclick="SshTerminal.disconnect()">Disconnect</button>
                    </div>
                </div>
                <div id="terminal-container"></div>

            </div>
        </div>

        <script>
            var SshTerminal = {
                term: null,
                ws: null,
                fitAddon: null,
                loaded: false,

                setStatus: function (connected, text) {
                    var dot = document.getElementById('statusDot');
                    var label = document.getElementById('statusText');
                    if (dot) dot.className = connected ? 'dot connected' : 'dot';
                    if (label) label.textContent = text || (connected ? 'Connected' : 'Disconnected');
                },

                getAccessToken: function () {
                    // Try ApiClient first (available when loaded inside Jellyfin SPA)
                    if (typeof ApiClient !== 'undefined' && ApiClient.accessToken) {
                        var token = ApiClient.accessToken();
                        if (token) return token;
                    }
                    // Fallback: read from localStorage where Jellyfin stores credentials
                    try {
                        var creds = JSON.parse(localStorage.getItem('jellyfin_credentials'));
                        if (creds && creds.Servers && creds.Servers.length > 0) {
                            return creds.Servers[0].AccessToken;
                        }
                    } catch (e) {
                        console.error('Failed to read Jellyfin credentials from localStorage', e);
                    }
                    return null;
                },

                getWebSocketUrl: function () {
                    var loc = window.location;
                    var proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
                    var basePath = loc.pathname.substring(0, loc.pathname.indexOf('/web/') + 1);
                    var apiKey = this.getAccessToken();
                    if (!apiKey) {
                        this.setStatus(false, 'No auth token found');
                        return null;
                    }
                    return proto + '//' + loc.host + basePath + 'SshTerminal/Socket?api_key=' + encodeURIComponent(apiKey);
                },

                loadXtermCss: function () {
                    if (document.getElementById('xterm-css')) return Promise.resolve();
                    return new Promise(function (resolve) {
                        var link = document.createElement('link');
                        link.id = 'xterm-css';
                        link.rel = 'stylesheet';
                        link.href = 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css';
                        link.onload = resolve;
                        document.head.appendChild(link);
                    });
                },

                loadScript: function (url) {
                    return new Promise(function (resolve, reject) {
                        var script = document.createElement('script');
                        script.src = url;
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                },

                loadDeps: function () {
                    if (typeof Terminal !== 'undefined') return Promise.resolve();
                    return this.loadXtermCss()
                        .then(function () {
                            return SshTerminal.loadScript('https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js');
                        })
                        .then(function () {
                            return SshTerminal.loadScript('https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js');
                        });
                },

                connect: function () {
                    var self = this;

                    var url = self.getWebSocketUrl();
                    if (!url) return;

                    if (self.ws && self.ws.readyState <= 1) {
                        self.ws.close();
                    }
                    if (self.term) {
                        self.term.dispose();
                    }

                    self.loadDeps().then(function () {
                        self.term = new Terminal({
                            cursorBlink: true,
                            fontSize: 14,
                            fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', monospace",
                            theme: {
                                background: '#1e1e1e',
                                foreground: '#d4d4d4',
                                cursor: '#d4d4d4'
                            },
                            allowProposedApi: true
                        });

                        self.fitAddon = new FitAddon.FitAddon();
                        self.term.loadAddon(self.fitAddon);

                        var container = document.getElementById('terminal-container');
                        while (container.firstChild) {
                            container.removeChild(container.firstChild);
                        }
                        self.term.open(container);
                        self.fitAddon.fit();

                        self.term.write('Connecting to SSH...\r\n');
                        self.setStatus(false, 'Connecting...');

                        self.ws = new WebSocket(url);
                        self.ws.binaryType = 'arraybuffer';

                        self.ws.onopen = function () {
                            self.setStatus(true, 'Connected');
                            self.term.clear();
                            var dims = self.fitAddon.proposeDimensions();
                            if (dims) {
                                self.ws.send(JSON.stringify({
                                    type: 'resize',
                                    cols: dims.cols,
                                    rows: dims.rows
                                }));
                            }
                        };

                        self.ws.onmessage = function (event) {
                            if (event.data instanceof ArrayBuffer) {
                                self.term.write(new Uint8Array(event.data));
                            } else {
                                self.term.write(event.data);
                            }
                        };

                        self.ws.onclose = function (event) {
                            self.setStatus(false, 'Disconnected (code: ' + event.code + ')');
                            self.term.write('\r\n\r\n[Connection closed]\r\n');
                        };

                        self.ws.onerror = function () {
                            self.setStatus(false, 'Connection error');
                        };

                        self.term.onData(function (data) {
                            if (self.ws && self.ws.readyState === WebSocket.OPEN) {
                                var encoder = new TextEncoder();
                                self.ws.send(encoder.encode(data));
                            }
                        });

                        self.term.onBinary(function (data) {
                            if (self.ws && self.ws.readyState === WebSocket.OPEN) {
                                var buffer = new Uint8Array(data.length);
                                for (var i = 0; i < data.length; i++) {
                                    buffer[i] = data.charCodeAt(i) & 0xff;
                                }
                                self.ws.send(buffer);
                            }
                        });

                        self.term.onResize(function (size) {
                            if (self.ws && self.ws.readyState === WebSocket.OPEN) {
                                self.ws.send(JSON.stringify({
                                    type: 'resize',
                                    cols: size.cols,
                                    rows: size.rows
                                }));
                            }
                        });

                        window.addEventListener('resize', function () {
                            if (self.fitAddon) {
                                self.fitAddon.fit();
                            }
                        });
                    });
                },

                reconnect: function () {
                    this.connect();
                },

                disconnect: function () {
                    if (this.ws) {
                        this.ws.close();
                    }
                    this.setStatus(false);
                },

                init: function () {
                    var token = this.getAccessToken();
                    if (token) {
                        this.connect();
                    } else {
                        var self = this;
                        setTimeout(function () { self.init(); }, 200);
                    }
                }
            };

            // Auto-connect when the page is shown
            document.addEventListener('viewshow', function () {
                SshTerminal.init();
            });

            // Fallback: also try on pageshow and DOMContentLoaded
            document.addEventListener('pageshow', function () {
                SshTerminal.init();
            });

            // If page is already loaded (direct navigation), start immediately
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                SshTerminal.init();
            }
        </script>
    </div>
</body>
</html>
